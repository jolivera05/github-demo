---
- name: RestartInstanaAgent
  hosts: all
  tasks:
    - name: restart Instana-Agent
      ansible.builtin.systemd_service:
        name: instana-agent
        state: restarted
        daemon_reload: true
      become: true
      
    - name: Register shell  
      ansible.builtin.shell: |
        ls -ls
        echo "Instana Agent restarted via systemd."
      register: shell_output

    - name: Show output
      ansible.builtin.debug:
        var: shell_output.stdout
